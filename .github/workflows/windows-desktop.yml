name: Build Windows Desktop Test Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "installers/**"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64 NSIS
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python build dependencies
        run: python -m pip install -e ".[proxy]" pyinstaller

      - name: Install frontend dependencies
        run: npm ci --prefix src-ui

      - name: Build Windows installer
        run: .\src-ui\node_modules\.bin\tauri.cmd build --bundles nsis

      - name: Copy installer into repository folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installers/windows | Out-Null
          Remove-Item installers/windows/*.exe -Force -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe installers/windows/

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: qise-windows-x64-test-installer
          path: installers/windows/*.exe
          if-no-files-found: error

      - name: Commit Windows installer to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add installers/windows
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "build: update Windows test installer [skip ci]"
            git push
          }
