name: Publish Desktop Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: Windows x64
            platform: windows-latest
            rust_target: ""
            args: --bundles nsis

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: python scripts/check_updater_signing_key.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Python build dependencies
        run: python -m pip install -e ".[proxy]" pyinstaller

      - name: Install frontend dependencies
        run: npm ci --prefix src-ui

      - name: Validate release version
        run: python scripts/check_release_version.py --tag "${{ github.ref_name }}"

      - name: Build signed desktop artifacts and draft release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npx --prefix src-ui tauri
          tagName: ${{ github.ref_name }}
          releaseName: Qise ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
